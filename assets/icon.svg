<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- teaveloper 공식 브랜드 그라데이션 (푸른 계열) -->
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#6366f1"/>
      <stop offset="50%"  stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <clipPath id="shield">
      <path d="M250 200 L774 200 L774 500 Q774 720 512 880 Q250 720 250 500 Z"/>
    </clipPath>
    <!-- 중앙 원형 틈: 십자선이 죽방을 가로지르지 않도록 가운데를 뚫는다 -->
    <mask id="centerHole">
      <rect x="0" y="0" width="1024" height="1024" fill="#FFFFFF"/>
      <circle cx="512" cy="480" r="104" fill="#000000"/>
    </mask>
  </defs>

  <!-- 배경 투명: 방패 모양 그대로가 아이콘이 된다 -->

  <!-- 보안 방패: 푸른 브랜드 그라데이션 -->
  <path d="M250 200 L774 200 L774 500 Q774 720 512 880 Q250 720 250 500 Z" fill="url(#g)"/>

  <!-- 4분할: 흰색 십자 구분선 (중앙은 원형 틈으로 끊음) -->
  <g clip-path="url(#shield)" mask="url(#centerHole)" fill="#FFFFFF">
    <rect x="503" y="196" width="18" height="684"/>
    <rect x="250" y="471" width="524" height="18"/>
  </g>

  <!-- 대각선 ↖ WiFi (흰색) -->
  <g fill="none" stroke="#FFFFFF" stroke-width="20" stroke-linecap="round">
    <path d="M318 348 A82 82 0 0 1 434 348"/>
    <path d="M343 373 A44 44 0 0 1 409 373"/>
  </g>
  <circle cx="376" cy="394" r="15" fill="#FFFFFF"/>

  <!-- 대각선 ↘ 전화 (흰색) -->
  <g transform="translate(598,578) scale(4.1)">
    <path fill="#FFFFFF" d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
  </g>

  <!-- 중앙: 죽방(竹防) — 원형 메달리온 없이 흰색 형상만 -->
  <g transform="translate(403.2,371.2) scale(1.7)" fill="#FFFFFF">
    <circle cx="64" cy="40" r="24"/>
    <path d="M64 53 L43 112 L85 112 Z"/>
  </g>
</svg>
