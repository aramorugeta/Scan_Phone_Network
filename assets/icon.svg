<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- teaveloper 공식 브랜드 그라데이션 -->
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#6366f1"/>
      <stop offset="50%"  stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <!-- 방패 모양 클립 -->
    <clipPath id="shield">
      <path d="M250 200 L774 200 L774 500 Q774 720 512 880 Q250 720 250 500 Z"/>
    </clipPath>
  </defs>

  <!-- 배경: 브랜드 그라데이션 둥근 사각 (28/128 * 1024 = 224) -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" fill="url(#g)"/>

  <!-- 보안 방패: 흰 바탕을 4분할(가운데 그라데이션 십자 틈으로 분할 표현) -->
  <g clip-path="url(#shield)">
    <rect x="250" y="196" width="253" height="275" fill="#FFFFFF"/>   <!-- TL -->
    <rect x="521" y="196" width="253" height="275" fill="#FFFFFF"/>   <!-- TR -->
    <rect x="250" y="489" width="253" height="400" fill="#FFFFFF"/>   <!-- BL -->
    <rect x="521" y="489" width="253" height="400" fill="#FFFFFF"/>   <!-- BR -->
  </g>
  <!-- 방패 외곽선 -->
  <path d="M250 200 L774 200 L774 500 Q774 720 512 880 Q250 720 250 500 Z"
        fill="none" stroke="#FFFFFF" stroke-width="14"/>

  <!-- 대각선 ↖ WiFi (좌상 사분면) -->
  <g fill="none" stroke="#6366f1" stroke-width="20" stroke-linecap="round">
    <path d="M320 350 A80 80 0 0 1 432 350"/>
    <path d="M344 374 A43 43 0 0 1 408 374"/>
  </g>
  <circle cx="376" cy="394" r="15" fill="#6366f1"/>

  <!-- 대각선 ↘ 전화 (우하 사분면) -->
  <g transform="translate(600,580) scale(4)">
    <path fill="#6366f1" d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
  </g>

  <!-- 중앙: 죽방 메달리온 (브랜드 그라데이션 원 + 흰 죽방) -->
  <circle cx="512" cy="480" r="132" fill="url(#g)" stroke="#FFFFFF" stroke-width="10"/>
  <!-- 죽방: 큰 원 + V-funnel 삼각형 (원본 logo 비율, 1.7배 확대) -->
  <g transform="translate(403.2,371.2) scale(1.7)" fill="#FFFFFF">
    <circle cx="64" cy="40" r="24"/>
    <path d="M64 53 L43 112 L85 112 Z"/>
  </g>
</svg>
